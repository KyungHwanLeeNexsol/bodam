# 보담 Nginx 리버스 프록시 설정
# 설정 위치: /etc/nginx/sites-available/bodam
# 심볼릭 링크: ln -s /etc/nginx/sites-available/bodam /etc/nginx/sites-enabled/bodam

# HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name _;  # 실제 도메인으로 교체 (예: bodam.example.com)

    # Certbot ACME 챌린지 (Let's Encrypt 인증 시 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 모든 HTTP 요청을 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 설정
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;  # 실제 도메인으로 교체 (예: bodam.example.com)

    # Certbot이 자동으로 채워줄 SSL 인증서 경로
    # certbot --nginx -d your-domain.com 실행 후 자동 설정
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 업로드 최대 크기 (파일 업로드 허용)
    client_max_body_size 10m;

    # Gzip 압축 설정
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 보안 헤더 (FastAPI 미들웨어와 중복되지 않도록 주석 처리)
    # add_header X-Frame-Options "SAMEORIGIN" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header X-XSS-Protection "1; mode=block" always;

    # API 프록시 설정 (/api/ -> FastAPI 백엔드)
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 요청 등 장시간 처리를 위한 타임아웃 설정
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;

        # 버퍼 설정 (스트리밍 응답 최적화)
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # WebSocket 지원 (Next.js HMR - 프로덕션에서도 무해)
    location /_next/webpack-hmr {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Next.js 정적 파일 캐싱 최적화
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        # Next.js 정적 파일은 content hash 포함 - 장기 캐싱 안전
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 프론트엔드 프록시 설정 (/ -> Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE(Server-Sent Events) 지원
        proxy_set_header Connection '';
        proxy_read_timeout 86400s;
    }
}
