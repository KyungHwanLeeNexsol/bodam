# HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    server_name _;

    # Let's Encrypt 인증서 발급용 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 요청을 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버
server {
    listen 443 ssl http2;
    server_name _;  # 실제 도메인으로 교체 필요: server_name yourdomain.com;

    # SSL 인증서 경로 (Let's Encrypt)
    # 실제 도메인으로 경로 교체 필요
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL 보안 파라미터
    include /etc/nginx/ssl/ssl-params.conf;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://bodam.vercel.app; frame-ancestors 'none';" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # API 리버스 프록시
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # 프록시 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 지원 (스트리밍 응답용)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 타임아웃 설정 (LLM 응답 고려)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 버퍼링 설정
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Webhook 엔드포인트 (배포 자동화 - GitHub Actions 대체)
    location /webhooks/ {
        proxy_pass http://localhost:9000/hooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 배포 완료까지 타임아웃 충분히 설정
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 루트 경로 -> Vercel 프론트엔드로 리다이렉트
    # 실제 Vercel 도메인으로 교체 필요
    location / {
        return 301 https://bodam.vercel.app$request_uri;
    }

    # Let's Encrypt 인증서 갱신용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
