global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "null"

  routes:
    - match:
        severity: critical
      receiver: "null"
      group_wait: 30s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "null"
      repeat_interval: 6h

    - match:
        severity: business
      receiver: "null"
      repeat_interval: 4h

receivers:
  - name: "null"

