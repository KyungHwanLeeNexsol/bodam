groups:
  - name: critical_alerts
    rules:
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status_code=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "에러율 5% 초과"
          description: "{{ $labels.instance }}에서 에러율이 {{ $value | humanizePercentage }}입니다."
          dashboard: "http://grafana:3001/d/app-performance"

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "P99 지연 시간 3초 초과"
          description: "P99 응답 시간이 {{ $value }}초 입니다."
          dashboard: "http://grafana:3001/d/app-performance"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "서비스 다운: {{ $labels.job }}"
          description: "{{ $labels.instance }} ({{ $labels.job }}) 서비스가 다운되었습니다."
          dashboard: "http://grafana:3001/d/infrastructure"

  - name: warning_alerts
    rules:
      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 지연 시간 1초 초과"
          description: "P95 응답 시간이 {{ $value }}초 입니다."

      - alert: ModerateErrorRate
        expr: |
          rate(http_requests_total{status_code=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "에러율 1% 초과"
          description: "{{ $labels.instance }}에서 에러율이 {{ $value | humanizePercentage }}입니다."

      - alert: HighQueueDepth
        expr: celery_queue_length > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Celery 큐 깊이 100 초과"
          description: "큐 {{ $labels.queue_name }}에 {{ $value }}개의 태스크가 대기 중입니다."

  - name: business_alerts
    rules:
      - alert: EmbeddingPipelineStalled
        expr: rate(bodam_embedding_processed_total[30m]) == 0
        for: 30m
        labels:
          severity: business
        annotations:
          summary: "임베딩 파이프라인 정지"
          description: "30분 이상 임베딩 처리가 없습니다."

      - alert: LLMCostApproachingBudget
        expr: sum(increase(bodam_llm_cost_usd_total[24h])) > 50 * 0.8
        for: 10m
        labels:
          severity: business
        annotations:
          summary: "LLM 일일 비용 예산 80% 도달"
          description: "24시간 LLM 비용이 ${{ $value }}로 예산의 80%를 초과했습니다."
