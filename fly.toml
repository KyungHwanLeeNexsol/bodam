# Fly.io configuration for Bodam Backend
app = 'bodam'
primary_region = 'nrt'  # Tokyo - same region as Fly Postgres (bodam-db)

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  PORT = '8000'
  ENVIRONMENT = 'production'
  DEBUG = 'false'
  LOG_LEVEL = 'info'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/api/v1/health'
    timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
