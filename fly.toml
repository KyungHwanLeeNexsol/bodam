# Fly.io 백엔드 배포 설정 (SPEC-INFRA-003 대체: Fly.io + Vercel + Neon + Upstash)
# 앱 이름은 fly launch 시 변경 가능

app = "bodam-backend"
primary_region = "nrt"  # 도쿄 (한국에서 가장 가까운 Fly.io 리전)

[build]
  dockerfile = "backend/Dockerfile"
  # Dockerfile 경로: 프로젝트 루트 기준

[env]
  PORT = "8000"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  # auto_stop_machines = false: 슬립 없이 항상 실행 (무료 VM 1개 사용)
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  # shared-cpu-1x 256MB: 무료 VM 3개 한도 중 1개 사용
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# 헬스체크: FastAPI /api/v1/health 엔드포인트
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/api/v1/health"
