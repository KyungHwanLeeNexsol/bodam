# 보안 취약점 자동 스캔 워크플로우 (SPEC-SEC-001 M5)
# Python 의존성(pip-audit) 및 npm 의존성(npm audit) 취약점을 검사합니다.
# High 이상 심각도 발견 시 CI를 실패시켜 취약한 코드가 main에 머지되는 것을 방지합니다.

name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.13 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      # pip-audit: Python 의존성 CVE 스캔
      - name: pip-audit 설치
        run: pip install pip-audit

      - name: Python 의존성 설치
        working-directory: backend
        run: pip install -e ".[dev]" || pip install -r requirements.txt 2>/dev/null || pip install .

      - name: pip-audit 실행 (High 이상 실패)
        working-directory: backend
        run: |
          pip-audit --strict --format=json --output=pip-audit-report.json \
            --ignore-vuln GHSA-jfh8-c2jp-5 \
            || (echo "::error::pip-audit 발견된 취약점이 있습니다. 위 리포트를 확인하세요." && exit 1)
        continue-on-error: false

      - name: pip-audit 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json
          retention-days: 30

      # npm audit: JavaScript 의존성 CVE 스캔
      - name: npm 의존성 설치
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: npm audit 실행 (High 이상 실패)
        working-directory: frontend
        run: |
          npm audit --audit-level=high --json > npm-audit-report.json \
            || (echo "::error::npm audit 발견된 취약점이 있습니다. 위 리포트를 확인하세요." && exit 1)
        continue-on-error: false

      - name: npm audit 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json
          retention-days: 30

      - name: 스캔 완료 알림
        if: success()
        run: echo "보안 스캔 완료 - 취약점 없음"
