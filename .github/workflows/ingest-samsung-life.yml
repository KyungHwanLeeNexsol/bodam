name: 삼성생명 크롤링 + 인제스트

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (DB에 실제로 저장하지 않음)'
        required: false
        default: false
        type: boolean
      resume_state_artifact:
        description: '재처리할 실패 상태 artifact 이름 (failure-state-samsung-life-RUNID 형식)'
        required: false
        default: ''


jobs:
  crawl-and-ingest:
    name: 삼성생명 크롤링 + 인제스트
    runs-on: ubuntu-latest
    timeout-minutes: 600  # 10시간 (6500개 × PDF 다운로드 + 인제스트)

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen

      # 삼성생명은 Vue SPA → Playwright 필수 (상품 목록 수집)
      - name: Playwright 브라우저 설치
        run: |
          cd backend
          uv run playwright install chromium --with-deps

      - name: 실패 상태 artifact 다운로드 (재처리 모드)
        if: ${{ inputs.resume_state_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.resume_state_artifact }}
          path: backend/
        continue-on-error: true

      - name: 삼성생명 크롤링 + 인제스트 실행
        id: crawl
        run: |
          cd backend

          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi

          RESUME_PARAM=""
          if [ -n "${{ inputs.resume_state_artifact }}" ] && [ -f "failure_state_samsung_life.json" ]; then
            RESUME_PARAM="--resume-state failure_state_samsung_life.json"
            echo "재처리 모드: failure_state_samsung_life.json 기반 실패 건 재처리"
          fi

          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_samsung_life \
            $DRY_RUN_PARAM \
            $RESUME_PARAM \
            --state-output failure_state_samsung_life.json

      - name: 실패 상태 artifact 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-samsung-life-${{ github.run_id }}
          path: backend/failure_state_samsung_life.json
          if-no-files-found: ignore
          retention-days: 30

      - name: 실행 결과 요약
        if: always()
        run: |
          echo "## 삼성생명 인제스트 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "backend/failure_state_samsung_life.json" ]; then
            FAIL_COUNT=$(python3 -c "import json; d=json.load(open('backend/failure_state_samsung_life.json')); print(len(d.get('failures', [])))" 2>/dev/null || echo "?")
            STOP_REASON=$(python3 -c "import json; d=json.load(open('backend/failure_state_samsung_life.json')); print(d.get('stop_reason', 'unknown'))" 2>/dev/null || echo "unknown")
            echo "- 실패 건수: ${FAIL_COUNT}건" >> $GITHUB_STEP_SUMMARY
            echo "- 중단 사유: ${STOP_REASON}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 재처리 방법" >> $GITHUB_STEP_SUMMARY
            echo "1. Actions 탭 → 이 워크플로우 → Run workflow" >> $GITHUB_STEP_SUMMARY
            echo "2. \`resume_state_artifact\` 에 \`failure-state-samsung-life-${{ github.run_id }}\` 입력" >> $GITHUB_STEP_SUMMARY
          fi
