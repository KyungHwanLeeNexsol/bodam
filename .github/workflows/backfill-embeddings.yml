name: 임베딩 백필 (bge-m3 로컬)

on:
  workflow_dispatch:
    inputs:
      company:
        description: '대상 보험사 (all = 전체)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - axa-general
          - db-insurance
          - hanwha-general
          - hanwha-life
          - heungkuk-fire
          - hyundai-marine
          - kb-nonlife
          - kyobo-life
          - lotte-insurance
          - meritz-fire
          - mg-insurance
          - nh-fire
          - samsung-fire
          - samsung-life
          - shinhan-life
      batch_size:
        description: '배치 크기'
        required: false
        default: '128'
      dry_run:
        description: 'Dry-run (DB에 실제로 저장하지 않음)'
        required: false
        default: false
        type: boolean

jobs:
  backfill:
    name: 임베딩 백필
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6시간

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: cd backend && uv sync --frozen

      - name: bge-m3 모델 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: bge-m3-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            bge-m3-

      - name: 임베딩 백필 실행
        run: |
          cd backend
          COMPANY_PARAM=""
          if [ "${{ inputs.company }}" != "all" ]; then
            COMPANY_PARAM="--company ${{ inputs.company }}"
          fi
          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi
          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            $COMPANY_PARAM $DRY_RUN_PARAM \
            --batch-size ${{ inputs.batch_size || '128' }}

      - name: 실행 결과 요약
        if: always()
        run: |
          echo "## 임베딩 백필 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 대상 보험사: ${{ inputs.company }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
