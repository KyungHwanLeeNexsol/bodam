name: 임베딩 백필 (embedding=NULL 청크 일괄 생성)

on:
  # 수동 실행 (GitHub Actions 탭에서 직접 트리거)
  workflow_dispatch:
    inputs:
      company:
        description: '대상 보험사 코드 (예: axa-general). 비워두면 전체 보험사'
        required: false
        default: 'axa-general'
      batch_size:
        description: 'Gemini API 호출당 청크 수 (기본: 50, 최대: 100)'
        required: false
        default: '50'
      dry_run:
        description: 'Dry-run (DB 쓰기 없이 대상 건수 확인만)'
        required: false
        default: false
        type: boolean


jobs:
  backfill-embeddings:
    name: 임베딩 백필
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6시간 (Actions 최대치)

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
      GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
      GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen

      - name: 임베딩 백필 실행
        id: backfill
        run: |
          cd backend

          # 파라미터 조립
          COMPANY_PARAM=""
          if [ -n "${{ inputs.company }}" ]; then
            COMPANY_PARAM="--company ${{ inputs.company }}"
          fi

          BATCH_SIZE_PARAM="--batch-size ${{ inputs.batch_size || '50' }}"

          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi

          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            $COMPANY_PARAM \
            $BATCH_SIZE_PARAM \
            $DRY_RUN_PARAM

      - name: 실행 결과 요약
        if: always()
        run: |
          echo "## 임베딩 백필 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 대상 보험사: ${{ inputs.company || '전체' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 배치 크기: ${{ inputs.batch_size || '50' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
