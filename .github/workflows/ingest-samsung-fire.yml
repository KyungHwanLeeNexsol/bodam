name: 삼성화재 크롤링 + 인제스트

on:
  # 수동 실행 (GitHub Actions 탭에서 직접 트리거)
  workflow_dispatch:
    inputs:
      gun:
        description: '수집 종류 (장기 / 일반보험 / 전체)'
        required: false
        default: '전체'
        type: choice
        options:
          - 전체
          - 장기
          - 일반보험
      dry_run:
        description: 'Dry-run (DB에 실제로 저장하지 않음)'
        required: false
        default: false
        type: boolean
      resume_state_artifact:
        description: '재처리할 실패 상태 artifact 이름 (failure-state-YYYY-MM-DD 형식, 비워두면 전체 실행)'
        required: false
        default: ''


# 같은 워크플로우 동시 실행 허용 (matrix shard별 독립 실행)
# concurrency 제거: 4개 shard가 병렬로 실행되어야 하므로 전역 잠금 없음

jobs:
  crawl-and-ingest:
    name: "삼성화재 인제스트 (shard ${{ matrix.shard }})"
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6시간 (shard당)

    strategy:
      fail-fast: false  # 한 shard 실패해도 나머지 계속 실행
      max-parallel: 4
      matrix:
        include:
          # 전체 ~8,147개 PDF를 4개 shard로 분할
          - shard: 0
            start_index: 0
            count: 2050
          - shard: 1
            start_index: 2050
            count: 2050
          - shard: 2
            start_index: 4100
            count: 2050
          - shard: 3
            start_index: 6150
            count: ""  # 끝까지 처리

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.FLY_DB_PASSWORD }}@localhost:5432/bodam
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Fly.io DB 프록시 터널
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: fly proxy 시작 + 연결 확인
        run: |
          flyctl proxy 5432 -a bodam-db &
          PROXY_PID=$!
          echo "Fly proxy PID: $PROXY_PID"
          for i in $(seq 1 30); do
            if nc -z localhost 5432 2>/dev/null; then
              echo "Fly proxy ready (${i}s)"
              break
            fi
            if ! kill -0 $PROXY_PID 2>/dev/null; then
              echo "ERROR: fly proxy process died"
              exit 1
            fi
            sleep 1
          done
          if ! nc -z localhost 5432 2>/dev/null; then
            echo "ERROR: fly proxy failed to start within 30s"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen

      # 재처리 모드: 이전 실패 상태 artifact 다운로드
      - name: 실패 상태 artifact 다운로드 (재처리 모드)
        if: ${{ inputs.resume_state_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.resume_state_artifact }}
          path: backend/
        continue-on-error: true  # artifact 없으면 전체 실행으로 폴백

      - name: 삼성화재 크롤링 + 인제스트 실행 (shard ${{ matrix.shard }})
        id: crawl
        run: |
          cd backend

          # gun 파라미터 처리
          GUN_PARAM=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.gun }}" != "전체" ]; then
              GUN_PARAM="--gun ${{ inputs.gun }}"
            fi
          fi

          # dry-run 파라미터
          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi

          # resume 파라미터 (실패 상태 재처리 모드)
          RESUME_PARAM=""
          if [ -n "${{ inputs.resume_state_artifact }}" ] && [ -f "failure_state_shard${{ matrix.shard }}.json" ]; then
            RESUME_PARAM="--resume-state failure_state_shard${{ matrix.shard }}.json"
            echo "재처리 모드: failure_state_shard${{ matrix.shard }}.json 기반 실패 건 재처리"
          fi

          # matrix shard 분할 파라미터
          SHARD_PARAM="--resume-from ${{ matrix.start_index }}"
          if [ -n "${{ matrix.count }}" ]; then
            SHARD_PARAM="$SHARD_PARAM --count ${{ matrix.count }}"
          fi

          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_samsung \
            $GUN_PARAM \
            $DRY_RUN_PARAM \
            $RESUME_PARAM \
            $SHARD_PARAM \
            --state-output failure_state_shard${{ matrix.shard }}.json

      # 실패 건이 있으면 artifact로 저장 (shard별)
      - name: 실패 상태 artifact 업로드 (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-shard${{ matrix.shard }}-${{ github.run_id }}
          path: backend/failure_state_shard${{ matrix.shard }}.json
          if-no-files-found: ignore
          retention-days: 30

      - name: 실행 결과 요약 (shard ${{ matrix.shard }})
        if: always()
        run: |
          echo "## 삼성화재 인제스트 결과 (shard ${{ matrix.shard }}: ${{ matrix.start_index }}~)" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- 종류 필터: ${{ inputs.gun || '전체' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          STATE_FILE="backend/failure_state_shard${{ matrix.shard }}.json"
          if [ -f "$STATE_FILE" ]; then
            FAIL_COUNT=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(len(d.get('failures', [])))" 2>/dev/null || echo "?")
            STOP_REASON=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('stop_reason', 'unknown'))" 2>/dev/null || echo "unknown")
            echo "- 실패 건수: ${FAIL_COUNT}건" >> $GITHUB_STEP_SUMMARY
            echo "- 중단 사유: ${STOP_REASON}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 재처리 방법" >> $GITHUB_STEP_SUMMARY
            echo "1. Actions 탭 → 이 워크플로우 → Run workflow" >> $GITHUB_STEP_SUMMARY
            echo "2. \`resume_state_artifact\` 에 \`failure-state-shard${{ matrix.shard }}-${{ github.run_id }}\` 입력" >> $GITHUB_STEP_SUMMARY
          fi
