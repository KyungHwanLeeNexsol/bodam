name: 삼성화재 크롤링 + 인제스트

on:
  # 수동 실행 (GitHub Actions 탭에서 직접 트리거)
  workflow_dispatch:
    inputs:
      gun:
        description: '수집 종류 (장기 / 일반보험 / 전체)'
        required: false
        default: '전체'
        type: choice
        options:
          - 전체
          - 장기
          - 일반보험
      dry_run:
        description: 'Dry-run (DB에 실제로 저장하지 않음)'
        required: false
        default: false
        type: boolean
      resume_from:
        description: '이어서 시작할 파일 번호 (--resume-from, 단순 인덱스 재시작)'
        required: false
        default: '0'
      resume_state_artifact:
        description: '재처리할 실패 상태 artifact 이름 (failure-state-YYYY-MM-DD 형식, 비워두면 전체 실행)'
        required: false
        default: ''


jobs:
  crawl-and-ingest:
    name: 삼성화재 크롤링 + 인제스트
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5시간 50분 (Actions 최대 6시간)

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen

      # 재처리 모드: 이전 실패 상태 artifact 다운로드
      - name: 실패 상태 artifact 다운로드 (재처리 모드)
        if: ${{ inputs.resume_state_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.resume_state_artifact }}
          path: backend/
        continue-on-error: true  # artifact 없으면 전체 실행으로 폴백

      - name: 삼성화재 크롤링 + 인제스트 실행
        id: crawl
        run: |
          cd backend

          # gun 파라미터 처리 (수동 실행 vs 스케줄)
          GUN_PARAM=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.gun }}" != "전체" ]; then
              GUN_PARAM="--gun ${{ inputs.gun }}"
            fi
          fi

          # dry-run 파라미터
          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi

          # resume 파라미터 (두 가지 모드)
          RESUME_PARAM=""
          if [ -n "${{ inputs.resume_state_artifact }}" ] && [ -f "failure_state.json" ]; then
            # 모드 1: 이전 실패 건만 재처리
            RESUME_PARAM="--resume-state failure_state.json"
            echo "재처리 모드: failure_state.json 기반 실패 건 재처리"
          elif [ "${{ inputs.resume_from }}" != "0" ] && [ -n "${{ inputs.resume_from }}" ]; then
            # 모드 2: 특정 인덱스부터 이어서
            RESUME_PARAM="--resume-from ${{ inputs.resume_from }}"
          fi

          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_samsung \
            $GUN_PARAM \
            $DRY_RUN_PARAM \
            $RESUME_PARAM \
            --state-output failure_state.json

      # 실패 건이 있으면 artifact로 저장 (다음 재처리 시 사용)
      - name: 실패 상태 artifact 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-${{ github.run_id }}
          path: backend/failure_state.json
          if-no-files-found: ignore
          retention-days: 30

      - name: 실행 결과 요약
        if: always()
        run: |
          echo "## 삼성화재 인제스트 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- 종류 필터: ${{ inputs.gun || '전체' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "backend/failure_state.json" ]; then
            FAIL_COUNT=$(python3 -c "import json; d=json.load(open('backend/failure_state.json')); print(len(d.get('failures', [])))" 2>/dev/null || echo "?")
            STOP_REASON=$(python3 -c "import json; d=json.load(open('backend/failure_state.json')); print(d.get('stop_reason', 'unknown'))" 2>/dev/null || echo "unknown")
            echo "- 실패 건수: ${FAIL_COUNT}건" >> $GITHUB_STEP_SUMMARY
            echo "- 중단 사유: ${STOP_REASON}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 재처리 방법" >> $GITHUB_STEP_SUMMARY
            echo "1. Actions 탭 → 이 워크플로우 → Run workflow" >> $GITHUB_STEP_SUMMARY
            echo "2. \`resume_state_artifact\` 에 \`failure-state-${{ github.run_id }}\` 입력" >> $GITHUB_STEP_SUMMARY
          fi
