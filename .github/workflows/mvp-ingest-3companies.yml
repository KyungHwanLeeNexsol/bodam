name: MVP 3개사 인제스트 + 임베딩 (현대해상, DB손보, 삼성화재)

on:
  workflow_dispatch:
    inputs:
      target:
        description: '실행 대상'
        required: false
        default: '전체 (3개사 순차)'
        type: choice
        options:
          - '전체 (3개사 순차)'
          - '현대해상만'
          - 'DB손보만'
          - '삼성화재만'
      skip_crawl:
        description: '크롤링 스킵 (DB에 이미 인제스트된 데이터 기준 임베딩만 실행)'
        required: false
        default: false
        type: boolean
      skip_embed:
        description: '임베딩 스킵 (크롤링+인제스트만 실행)'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry-run (DB에 실제로 저장하지 않음)'
        required: false
        default: false
        type: boolean
      embed_batch_size:
        description: '임베딩 배치 크기 (기본: 64, 메모리 부족 시 줄이기)'
        required: false
        default: '64'

jobs:
  # ─────────────────────────────────────────
  # Step 1: 현대해상 크롤링 + 인제스트
  # ─────────────────────────────────────────
  hyundai-marine:
    name: "1/3 현대해상 크롤링 + 인제스트"
    if: ${{ inputs.target == '전체 (3개사 순차)' || inputs.target == '현대해상만' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Fly.io CLI 설치 + WireGuard 터널
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl wireguard websockets -a bodam-db &
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: cd backend && uv sync --frozen

      # 현대해상은 Playwright 필수 (SPA, JS 렌더링)
      - name: Playwright 브라우저 설치
        if: ${{ inputs.skip_crawl != 'true' }}
        run: cd backend && uv run playwright install chromium --with-deps

      - name: 현대해상 크롤링 + 인제스트
        if: ${{ inputs.skip_crawl != 'true' }}
        run: |
          cd backend
          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi
          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_hyundai_marine \
            $DRY_RUN_PARAM \
            --state-output failure_state_hyundai_marine.json

      - name: 실패 상태 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-hyundai-marine-${{ github.run_id }}
          path: backend/failure_state_hyundai_marine.json
          if-no-files-found: ignore
          retention-days: 14

    outputs:
      status: ${{ job.status }}

  # ─────────────────────────────────────────
  # Step 2: DB손보 크롤링 + 인제스트
  # ─────────────────────────────────────────
  db-insurance:
    name: "2/3 DB손보 크롤링 + 인제스트"
    if: ${{ always() && (inputs.target == '전체 (3개사 순차)' || inputs.target == 'DB손보만') }}
    needs: [hyundai-marine]
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Fly.io CLI 설치 + WireGuard 터널
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl wireguard websockets -a bodam-db &
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: cd backend && uv sync --frozen

      - name: DB손보 크롤링 + 인제스트
        if: ${{ inputs.skip_crawl != 'true' }}
        run: |
          cd backend
          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi
          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_db \
            $DRY_RUN_PARAM \
            --state-output failure_state_db_insurance.json

      - name: 실패 상태 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-db-insurance-${{ github.run_id }}
          path: backend/failure_state_db_insurance.json
          if-no-files-found: ignore
          retention-days: 14

    outputs:
      status: ${{ job.status }}

  # ─────────────────────────────────────────
  # Step 3: 삼성화재 크롤링 + 인제스트
  # ─────────────────────────────────────────
  samsung-fire:
    name: "3/3 삼성화재 크롤링 + 인제스트"
    if: ${{ always() && (inputs.target == '전체 (3개사 순차)' || inputs.target == '삼성화재만') }}
    needs: [db-insurance]
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Fly.io CLI 설치 + WireGuard 터널
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl wireguard websockets -a bodam-db &
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: cd backend && uv sync --frozen

      - name: 삼성화재 크롤링 + 인제스트
        if: ${{ inputs.skip_crawl != 'true' }}
        run: |
          cd backend
          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi
          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_samsung \
            $DRY_RUN_PARAM \
            --state-output failure_state_samsung_fire.json

      - name: 실패 상태 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-samsung-fire-${{ github.run_id }}
          path: backend/failure_state_samsung_fire.json
          if-no-files-found: ignore
          retention-days: 14

    outputs:
      status: ${{ job.status }}

  # ─────────────────────────────────────────
  # Step 4: 임베딩 백필 (3개사 순차)
  # ─────────────────────────────────────────
  embedding-backfill:
    name: "임베딩 백필 (BAAI/bge-m3)"
    if: ${{ inputs.skip_embed != 'true' && always() }}
    needs: [hyundai-marine, db-insurance, samsung-fire]
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6시간

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Fly.io CLI 설치 + WireGuard 터널
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl wireguard websockets -a bodam-db &
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: cd backend && uv sync --frozen

      - name: 현대해상 임베딩 백필
        if: ${{ inputs.target == '전체 (3개사 순차)' || inputs.target == '현대해상만' }}
        run: |
          cd backend
          echo "=== 현대해상 임베딩 시작 ==="
          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            --company hyundai-marine \
            --batch-size ${{ inputs.embed_batch_size || '64' }}
          echo "=== 현대해상 임베딩 완료 ==="

      - name: DB손보 임베딩 백필
        if: ${{ inputs.target == '전체 (3개사 순차)' || inputs.target == 'DB손보만' }}
        run: |
          cd backend
          echo "=== DB손보 임베딩 시작 ==="
          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            --company db-insurance \
            --batch-size ${{ inputs.embed_batch_size || '64' }}
          echo "=== DB손보 임베딩 완료 ==="

      - name: 삼성화재 임베딩 백필
        if: ${{ inputs.target == '전체 (3개사 순차)' || inputs.target == '삼성화재만' }}
        run: |
          cd backend
          echo "=== 삼성화재 임베딩 시작 ==="
          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            --company samsung-fire \
            --batch-size ${{ inputs.embed_batch_size || '64' }}
          echo "=== 삼성화재 임베딩 완료 ==="

      - name: 임베딩 결과 검증
        run: |
          cd backend
          PYTHONPATH=. uv run python -c "
          import asyncio
          from app.core.database import init_database
          from app.core.config import get_settings
          from sqlalchemy import text

          async def verify():
              settings = get_settings()
              await init_database(settings)
              from app.core.database import session_factory
              async with session_factory() as session:
                  # 전체 청크 수
                  total = await session.execute(text('SELECT COUNT(*) FROM policy_chunks'))
                  total_count = total.scalar()
                  # NULL 임베딩 수
                  null_embed = await session.execute(text('SELECT COUNT(*) FROM policy_chunks WHERE embedding IS NULL'))
                  null_count = null_embed.scalar()
                  # 보험사별 통계
                  stats = await session.execute(text('''
                      SELECT ic.name, COUNT(pc.id) as chunks, COUNT(pc.embedding) as embedded
                      FROM policy_chunks pc
                      JOIN policies p ON pc.policy_id = p.id
                      JOIN insurance_companies ic ON p.company_id = ic.id
                      WHERE ic.code IN ('hyundai-marine', 'db-insurance', 'samsung-fire')
                      GROUP BY ic.name
                      ORDER BY ic.name
                  '''))
                  print(f'총 청크: {total_count}')
                  print(f'NULL 임베딩: {null_count}')
                  print()
                  for row in stats:
                      print(f'{row[0]}: {row[1]}개 청크, {row[2]}개 임베딩 완료')

          asyncio.run(verify())
          "

      - name: 실행 결과 요약
        if: always()
        run: |
          echo "## MVP 3개사 임베딩 백필 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 대상: ${{ inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- 배치 크기: ${{ inputs.embed_batch_size || '64' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 크롤링 스킵: ${{ inputs.skip_crawl }}" >> $GITHUB_STEP_SUMMARY
          echo "- 임베딩 스킵: ${{ inputs.skip_embed }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # 최종 결과 리포트
  # ─────────────────────────────────────────
  report:
    name: "최종 결과 리포트"
    if: always()
    needs: [hyundai-marine, db-insurance, samsung-fire, embedding-backfill]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 결과 요약
        run: |
          echo "## MVP 3개사 인제스트 + 임베딩 파이프라인 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 단계 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 현대해상 크롤링+인제스트 | ${{ needs.hyundai-marine.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DB손보 크롤링+인제스트 | ${{ needs.db-insurance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 삼성화재 크롤링+인제스트 | ${{ needs.samsung-fire.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 임베딩 백필 | ${{ needs.embedding-backfill.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 설정" >> $GITHUB_STEP_SUMMARY
          echo "- 대상: ${{ inputs.target || '전체 (3개사 순차)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 크롤링 스킵: ${{ inputs.skip_crawl || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 임베딩 스킵: ${{ inputs.skip_embed || 'false' }}" >> $GITHUB_STEP_SUMMARY
