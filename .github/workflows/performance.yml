name: Performance Tests

on:
  push:
    branches: [main]
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: false
        default: 'baseline'
        type: choice
        options:
          - baseline
          - stress
          - spike
          - soak

env:
  BASE_URL: http://localhost:8000

jobs:
  performance-test:
    name: K6 Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.yml up -d --wait
        env:
          SECRET_KEY: ci-performance-test-secret-key-not-for-production
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder-for-ci' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder-for-ci' }}

      - name: Wait for health check to be ready
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "ERROR: API did not become ready within 60 seconds"
              docker compose logs
              exit 1
            fi
            echo "Attempt $i/30 - waiting 2 seconds..."
            sleep 2
          done

      - name: Run k6 baseline test
        id: k6_test
        uses: grafana/run-k6-action@v1
        with:
          path: performance/k6/scenarios/baseline.js
          flags: --out json=performance-results.json
        env:
          BASE_URL: ${{ env.BASE_URL }}
        continue-on-error: true

      - name: Check threshold results
        run: |
          if [ "${{ steps.k6_test.outcome }}" == "failure" ]; then
            echo "::error::K6 performance thresholds exceeded! SLO violation detected."
            echo "Review the performance report artifact for details."
            exit 1
          fi
          echo "All performance thresholds passed."

      - name: Generate HTML report
        if: always()
        run: |
          if [ -f performance-results.json ]; then
            echo "Performance results file found, report already generated by k6"
          else
            echo "No results file found"
          fi

      - name: Upload performance report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-${{ github.sha }}
          path: |
            performance-report-*.html
            performance-summary-*.json
            performance-results.json
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.k6_test.outcome }}';
            const status = outcome === 'success' ? '✅ PASSED' : '❌ FAILED';
            const body = `## Performance Test Results: ${status}

            **Commit:** \`${{ github.sha }}\`
            **Test:** Baseline (10 VUs, 1 minute)
            **Thresholds:**
            - http_req_duration p95 < 1000ms
            - http_req_duration p99 < 3000ms
            - http_req_failed rate < 1%

            See the [performance report artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed results.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Stop services
        if: always()
        run: docker compose down -v

  stress-test:
    name: K6 Stress Test (Manual/Scheduled Only)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only run stress test on schedule or manual dispatch with 'stress' type
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'stress')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Start services
        run: docker compose up -d --wait
        env:
          SECRET_KEY: ci-stress-test-secret-key-not-for-production

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API ready"
              break
            fi
            sleep 2
          done

      - name: Run k6 stress test
        uses: grafana/run-k6-action@v1
        with:
          path: performance/k6/scenarios/stress.js
          flags: --out json=stress-results.json
        env:
          BASE_URL: ${{ env.BASE_URL }}
        continue-on-error: true

      - name: Upload stress test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-report-${{ github.sha }}
          path: |
            performance-report-*.html
            stress-results.json
          retention-days: 30

      - name: Stop services
        if: always()
        run: docker compose down -v
