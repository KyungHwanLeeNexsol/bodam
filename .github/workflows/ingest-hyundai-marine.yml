name: 현대해상화재보험 크롤링 + 인제스트

on:
  # 수동 실행
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (크롤링만 하고 DB에 저장하지 않음)'
        required: false
        default: false
        type: boolean
      resume_state_artifact:
        description: '재처리할 실패 상태 artifact 이름 (failure-state-hyundai-marine-RUNID 형식, 비워두면 전체 실행)'
        required: false
        default: ''


jobs:
  crawl-and-ingest:
    name: 현대해상화재보험 크롤링 + 인제스트
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6시간 (Actions 최대치)

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.FLY_DB_PASSWORD }}@localhost:5432/bodam
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Fly.io DB 프록시 터널
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: fly proxy 시작 (localhost:5432 → bodam-db:5432)
        run: |
          flyctl proxy 5432 -a bodam-db &
          sleep 3
          echo "Fly proxy started"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen

      # 현대해상은 Playwright 필수 (SPA, JS 렌더링)
      - name: Playwright 브라우저 설치
        run: |
          cd backend
          uv run playwright install chromium --with-deps

      # 재처리 모드: 이전 실패 상태 artifact 다운로드
      - name: 실패 상태 artifact 다운로드 (재처리 모드)
        if: ${{ inputs.resume_state_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.resume_state_artifact }}
          path: backend/
        continue-on-error: true

      - name: 현대해상화재보험 크롤링 + 인제스트 실행
        run: |
          cd backend

          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi

          RESUME_PARAM=""
          if [ -n "${{ inputs.resume_state_artifact }}" ] && [ -f "failure_state_hyundai_marine.json" ]; then
            RESUME_PARAM="--resume-state failure_state_hyundai_marine.json"
            echo "재처리 모드: failure_state_hyundai_marine.json 기반 실패 건 재처리"
          fi

          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_hyundai_marine \
            $DRY_RUN_PARAM \
            $RESUME_PARAM \
            --state-output failure_state_hyundai_marine.json

      - name: 실패 상태 artifact 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-hyundai-marine-${{ github.run_id }}
          path: backend/failure_state_hyundai_marine.json
          if-no-files-found: ignore
          retention-days: 30

      - name: 실행 결과 요약
        if: always()
        run: |
          echo "## 현대해상화재보험 인제스트 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "backend/failure_state_hyundai_marine.json" ]; then
            FAIL_COUNT=$(python3 -c "import json; d=json.load(open('backend/failure_state_hyundai_marine.json')); print(len(d.get('failures', [])))" 2>/dev/null || echo "?")
            STOP_REASON=$(python3 -c "import json; d=json.load(open('backend/failure_state_hyundai_marine.json')); print(d.get('stop_reason', 'unknown'))" 2>/dev/null || echo "unknown")
            echo "- 실패 건수: ${FAIL_COUNT}건" >> $GITHUB_STEP_SUMMARY
            echo "- 중단 사유: ${STOP_REASON}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 재처리 방법" >> $GITHUB_STEP_SUMMARY
            echo "1. Actions 탭 → Run workflow" >> $GITHUB_STEP_SUMMARY
            echo "2. \`resume_state_artifact\` 에 \`failure-state-hyundai-marine-${{ github.run_id }}\` 입력" >> $GITHUB_STEP_SUMMARY
          fi
