# GitHub Actions 배포 비활성화
# GitHub push → GitHub Webhook → OCI VM webhook 데몬 → deploy.sh
#
# 설정 방법:
#   1. OCI VM: sudo bash deploy/oci/setup-webhook.sh YOUR_SECRET
#   2. GitHub: Settings → Webhooks → Add webhook
#      Payload URL: https://yourdomain.com/webhooks/deploy-bodam
#      Content type: application/json
#      Secret: YOUR_SECRET (setup-webhook.sh에서 사용한 값)
#      Events: Just the push event (main 브랜치만 자동 필터됨)
#
# 이 파일은 GitHub Actions를 사용하지 않으므로 분 소비 없음.
# 레포를 public으로 바꾸면 GitHub Actions도 무제한 무료로 복구 가능.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '수동 배포 사유 (현재 webhook 방식 사용 중)'
        required: false

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: 배포 방식 안내
        run: |
          echo "현재 배포는 GitHub Webhook + OCI VM 방식으로 운영됩니다."
          echo "main 브랜치 push 시 자동으로 OCI VM의 webhook 데몬이 deploy.sh를 실행합니다."
          echo "수동 배포: OCI VM에서 bash /home/ubuntu/bodam/deploy/scripts/deploy.sh"
