name: Fly.io 자동 배포

# main 브랜치 push 시 자동 배포
# 순서: 테스트 → 배포 → DB 마이그레이션
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '테스트 건너뜀 (긴급 배포 시 사용)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false  # 배포는 취소하지 않고 순서대로 실행

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 백엔드 유닛 테스트
  # ─────────────────────────────────────────────
  test:
    name: 백엔드 테스트
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql+asyncpg://bodam:bodam_test@localhost:5432/bodam_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci-testing-only
      GEMINI_API_KEY: test-gemini-key
      PYTHONIOENCODING: utf-8

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: bodam_test
          POSTGRES_USER: bodam
          POSTGRES_PASSWORD: bodam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen

      - name: 테스트 실행
        run: |
          cd backend
          uv run pytest tests/ \
            --tb=short \
            -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80
        env:
          PYTHONIOENCODING: utf-8

      - name: 테스트 결과 요약
        if: always()
        run: |
          echo "## 테스트 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 커밋: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Job 2: Fly.io 배포
  # ─────────────────────────────────────────────
  deploy:
    name: Fly.io 배포
    runs-on: ubuntu-latest
    needs: [test]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    timeout-minutes: 20

    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Fly CLI 설치
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly.io 배포
        run: flyctl deploy --app bodam --remote-only

      - name: 배포 헬스체크
        run: |
          echo "헬스체크 대기 (30초)..."
          sleep 30
          STATUS=$(curl -sf https://bodam.fly.dev/api/v1/health -o /dev/null -w "%{http_code}" || echo "000")
          echo "헬스체크 응답: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "헬스체크 실패 (HTTP $STATUS)"
            exit 1
          fi
          echo "헬스체크 통과"

      - name: 배포 결과 요약
        if: always()
        run: |
          echo "## Fly.io 배포 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 앱: bodam" >> $GITHUB_STEP_SUMMARY
          echo "- 커밋: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://bodam.fly.dev" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Job 3: DB 마이그레이션
  # ─────────────────────────────────────────────
  migrate:
    name: DB 마이그레이션
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success'
    timeout-minutes: 30

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.FLY_DB_PASSWORD }}@localhost:5432/bodam
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PYTHONIOENCODING: utf-8
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Fly CLI 설치
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly DB 프록시 터널 시작
        run: |
          flyctl proxy 5432 -a bodam-db &
          echo "프록시 대기 중..."
          for i in $(seq 1 30); do
            if nc -z localhost 5432 2>/dev/null; then
              echo "Fly proxy 준비 완료 (${i}s)"
              break
            fi
            sleep 1
          done
          if ! nc -z localhost 5432 2>/dev/null; then
            echo "ERROR: fly proxy가 30초 내에 시작되지 않음"
            exit 1
          fi

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen --no-dev

      - name: 현재 마이그레이션 상태 확인
        run: |
          cd backend
          PYTHONPATH=. uv run alembic current 2>&1

      - name: DB 마이그레이션 실행
        run: |
          cd backend
          PYTHONPATH=. uv run alembic upgrade head 2>&1

      - name: 마이그레이션 완료 확인
        run: |
          cd backend
          PYTHONPATH=. uv run alembic current 2>&1

      - name: 마이그레이션 결과 요약
        if: always()
        run: |
          echo "## DB 마이그레이션 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 커밋: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
