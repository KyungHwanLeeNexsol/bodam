name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 백엔드: Fly.io 배포 ──────────────────────────────────────────────────
  deploy-backend:
    name: Backend → Fly.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        run: flyctl ssh console --command "uv run alembic upgrade head" --app bodam-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── 프론트엔드: Vercel 자동 배포 (별도 설정 불필요) ────────────────────
  # Vercel GitHub 통합을 사용하면 main 브랜치 push 시 자동으로 배포됩니다.
  # Vercel 대시보드 → 프로젝트 연결 → GitHub 통합 활성화
  #
  # 또는 아래 주석을 해제하여 Vercel CLI를 통한 명시적 배포 사용:
  # deploy-frontend:
  #   name: Frontend → Vercel
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
