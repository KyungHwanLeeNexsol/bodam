name: 임베딩 백필 (OpenAI text-embedding-3-small)

on:
  workflow_dispatch:
    inputs:
      target:
        description: '임베딩 대상'
        required: false
        default: '3개사 (현대해상, DB손보, 삼성화재)'
        type: choice
        options:
          - '3개사 (현대해상, DB손보, 삼성화재)'
          - '현대해상만'
          - 'DB손보만'
          - '삼성화재만'
          - '전체 (embedding=NULL인 모든 보험사)'
      batch_size:
        description: '배치 크기 (기본: 2048, OpenAI API 최대: 2048)'
        required: false
        default: '2048'
      concurrency:
        description: 'API 동시 호출 수 (기본: 16, 높을수록 빠름)'
        required: false
        default: '16'
      dry_run:
        description: 'Dry-run (실제 DB 업데이트 없이 대상 건수만 확인)'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [embedding-backfill-continue]

permissions:
  contents: write

jobs:
  embedding:
    name: "임베딩 백필"
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6시간

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.FLY_DB_PASSWORD }}@localhost:5432/bodam
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMBEDDING_PROVIDER: openai
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Fly.io DB 프록시 터널
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: fly proxy 시작 + 연결 확인
        run: |
          flyctl proxy 5432 -a bodam-db &
          PROXY_PID=$!
          echo "Fly proxy PID: $PROXY_PID"
          for i in $(seq 1 30); do
            if nc -z localhost 5432 2>/dev/null; then
              echo "Fly proxy ready (${i}s)"
              break
            fi
            if ! kill -0 $PROXY_PID 2>/dev/null; then
              echo "ERROR: fly proxy process died"
              exit 1
            fi
            sleep 1
          done
          if ! nc -z localhost 5432 2>/dev/null; then
            echo "ERROR: fly proxy failed to start within 30s"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: cd backend && uv sync --frozen

      # ── 현대해상 ──

      - name: 현대해상 임베딩
        if: ${{ inputs.target == '3개사 (현대해상, DB손보, 삼성화재)' || inputs.target == '현대해상만' || github.event.client_payload.target == '현대해상만' }}
        run: |
          cd backend
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          CONCURRENCY="${{ inputs.concurrency || github.event.client_payload.concurrency || '16' }}"
          BATCH_SIZE="${{ inputs.batch_size || github.event.client_payload.batch_size || '2048' }}"
          echo "=== 현대해상 임베딩 시작 (동시 호출: $CONCURRENCY) ==="
          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            --company hyundai-marine \
            --batch-size $BATCH_SIZE \
            --concurrency $CONCURRENCY $DRY
          echo "=== 현대해상 임베딩 완료 ==="

      # ── DB손보 ──
      - name: DB손보 임베딩
        if: ${{ inputs.target == '3개사 (현대해상, DB손보, 삼성화재)' || inputs.target == 'DB손보만' || github.event.client_payload.target == 'DB손보만' }}
        run: |
          cd backend
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          CONCURRENCY="${{ inputs.concurrency || github.event.client_payload.concurrency || '16' }}"
          BATCH_SIZE="${{ inputs.batch_size || github.event.client_payload.batch_size || '2048' }}"
          echo "=== DB손보 임베딩 시작 (동시 호출: $CONCURRENCY) ==="
          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            --company db-insurance \
            --batch-size $BATCH_SIZE \
            --concurrency $CONCURRENCY $DRY
          echo "=== DB손보 임베딩 완료 ==="

      # ── 삼성화재 ──
      - name: 삼성화재 임베딩
        if: ${{ inputs.target == '3개사 (현대해상, DB손보, 삼성화재)' || inputs.target == '삼성화재만' || github.event.client_payload.target == '삼성화재만' }}
        run: |
          cd backend
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          CONCURRENCY="${{ inputs.concurrency || github.event.client_payload.concurrency || '16' }}"
          BATCH_SIZE="${{ inputs.batch_size || github.event.client_payload.batch_size || '2048' }}"
          echo "=== 삼성화재 임베딩 시작 (동시 호출: $CONCURRENCY) ==="
          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            --company samsung-fire \
            --batch-size $BATCH_SIZE \
            --concurrency $CONCURRENCY $DRY
          echo "=== 삼성화재 임베딩 완료 ==="

      # ── 전체 ──
      - name: 전체 임베딩 (모든 보험사)
        if: ${{ inputs.target == '전체 (embedding=NULL인 모든 보험사)' || github.event.client_payload.target == '전체' }}
        run: |
          cd backend
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          CONCURRENCY="${{ inputs.concurrency || github.event.client_payload.concurrency || '16' }}"
          BATCH_SIZE="${{ inputs.batch_size || github.event.client_payload.batch_size || '2048' }}"
          echo "=== 전체 임베딩 시작 (동시 호출: $CONCURRENCY) ==="
          PYTHONPATH=. uv run python -m scripts.backfill_embeddings \
            --batch-size $BATCH_SIZE \
            --concurrency $CONCURRENCY $DRY
          echo "=== 전체 임베딩 완료 ==="

      # ── 결과 검증 ──
      - name: 임베딩 결과 검증
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          cd backend
          PYTHONPATH=. uv run python -c "
          import asyncio
          from app.core.database import init_database
          from app.core.config import get_settings
          from sqlalchemy import text

          async def verify():
              settings = get_settings()
              await init_database(settings)
              from app.core.database import session_factory
              async with session_factory() as session:
                  total = await session.execute(text('SELECT COUNT(*) FROM policy_chunks'))
                  null_embed = await session.execute(text('SELECT COUNT(*) FROM policy_chunks WHERE embedding IS NULL'))
                  stats = await session.execute(text('''
                      SELECT ic.name, COUNT(pc.id) as chunks,
                             SUM(CASE WHEN pc.embedding IS NOT NULL THEN 1 ELSE 0 END) as embedded
                      FROM policy_chunks pc
                      JOIN policies p ON pc.policy_id = p.id
                      JOIN insurance_companies ic ON p.company_id = ic.id
                      WHERE ic.code IN ('hyundai-marine', 'db-insurance', 'samsung-fire')
                      GROUP BY ic.name ORDER BY ic.name
                  '''))
                  print(f'총 청크: {total.scalar()}')
                  print(f'NULL 임베딩: {null_embed.scalar()}')
                  for row in stats:
                      pct = (row[2]/row[1]*100) if row[1] > 0 else 0
                      print(f'{row[0]}: {row[1]}개 청크, {row[2]}개 임베딩 ({pct:.1f}%)')
          asyncio.run(verify())
          "

      # ── 잔여 있으면 자동 재실행 ──
      - name: 잔여 있으면 자동 재실행
        if: ${{ inputs.dry_run != 'true' && github.event.inputs.dry_run != 'true' }}
        run: |
          TARGET="${{ inputs.target || github.event.client_payload.target }}"
          BATCH_SIZE="${{ inputs.batch_size || github.event.client_payload.batch_size || '2048' }}"
          CONCURRENCY="${{ inputs.concurrency || github.event.client_payload.concurrency || '16' }}"

          # 잔여 NULL 임베딩 수 확인
          REMAINING=$(cd backend && PYTHONPATH=. uv run python -c "
          import asyncio, os, sys
          sys.path.insert(0, '.')
          from app.core.config import Settings
          import app.core.database as db_module
          from scripts.backfill_embeddings import count_null_embeddings

          async def check():
              settings = Settings()
              await db_module.init_database(settings)
              company = None
              if 'hyundai-marine' in '$TARGET' or '$TARGET' == '현대해상만':
                  company = 'hyundai-marine'
              elif 'db-insurance' in '$TARGET' or '$TARGET' == 'DB손보만':
                  company = 'db-insurance'
              elif 'samsung-fire' in '$TARGET' or '$TARGET' == '삼성화재만':
                  company = 'samsung-fire'
              count = await count_null_embeddings(db_module.session_factory, company)
              print(count)

          asyncio.run(check())
          " 2>/dev/null || echo "0")

          echo "잔여 임베딩: $REMAINING개"

          if [ "$REMAINING" -gt "0" ]; then
            echo "잔여 $REMAINING개 감지 → 자동 재실행 트리거"
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d "{\"event_type\":\"embedding-backfill-continue\",\"client_payload\":{\"target\":\"$TARGET\",\"batch_size\":\"$BATCH_SIZE\",\"concurrency\":\"$CONCURRENCY\"}}"
            echo "재실행 트리거 완료"
          else
            echo "임베딩 완료! 더 이상 잔여 없음."
          fi

      - name: 결과 요약
        if: always()
        run: |
          echo "## 임베딩 백필 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 대상: ${{ inputs.target || github.event.client_payload.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- 배치 크기: ${{ inputs.batch_size || github.event.client_payload.batch_size || '2048' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 동시 호출: ${{ inputs.concurrency || github.event.client_payload.concurrency || '16' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
