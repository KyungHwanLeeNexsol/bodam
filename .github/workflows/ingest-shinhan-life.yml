name: 신한라이프 크롤링 + 인제스트

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (DB에 실제로 저장하지 않음)'
        required: false
        default: false
        type: boolean
      resume_state_artifact:
        description: '재처리할 실패 상태 artifact 이름 (failure-state-shinhan-life-RUNID 형식)'
        required: false
        default: ''


jobs:
  crawl-and-ingest:
    name: 신한라이프 크롤링 + 인제스트
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6시간 (Actions 최대치)

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen

      - name: Playwright 브라우저 설치
        run: |
          cd backend
          uv run playwright install chromium --with-deps

      - name: 실패 상태 artifact 다운로드 (재처리 모드)
        if: ${{ inputs.resume_state_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.resume_state_artifact }}
          path: backend/
        continue-on-error: true

      - name: 신한라이프 크롤링 + 인제스트 실행
        id: crawl
        run: |
          cd backend
          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi
          RESUME_PARAM=""
          if [ -n "${{ inputs.resume_state_artifact }}" ] && [ -f "failure_state_shinhan_life.json" ]; then
            RESUME_PARAM="--resume-state failure_state_shinhan_life.json"
          fi
          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_shinhan_life \
            $DRY_RUN_PARAM $RESUME_PARAM \
            --state-output failure_state_shinhan_life.json

      - name: 실패 상태 artifact 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-shinhan-life-${{ github.run_id }}
          path: backend/failure_state_shinhan_life.json
          if-no-files-found: ignore
          retention-days: 30

      - name: 실행 결과 요약
        if: always()
        run: |
          echo "## 신한라이프 인제스트 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "backend/failure_state_shinhan_life.json" ]; then
            FAIL_COUNT=$(python3 -c "import json; d=json.load(open('backend/failure_state_shinhan_life.json')); print(len(d.get('failures', [])))" 2>/dev/null || echo "?")
            echo "- 실패 건수: ${FAIL_COUNT}건" >> $GITHUB_STEP_SUMMARY
          fi
