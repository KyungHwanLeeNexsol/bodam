name: 범용 보험사 크롤링 + 인제스트

on:
  workflow_dispatch:
    inputs:
      company_code:
        description: |
          보험사 코드 (config/companies/*.yaml 기반)
          생명: hanwha_life / kyobo_life / samsung_life / shinhan_life / nh_life / heungkuk_life / dongyang_life / mirae_life
          손해: hyundai_marine / meritz_fire / hanwha_general / heungkuk_fire / axa_general / hana_insurance / mg_insurance / nh_insurance / lotte_insurance
        required: true
        default: 'hanwha_life'
      dry_run:
        description: 'Dry-run (크롤링만 하고 DB에 저장하지 않음)'
        required: false
        default: false
        type: boolean
      fail_threshold:
        description: '실패율 임계값 (기본값: 0.05 = 5%)'
        required: false
        default: '0.05'
      resume_state_artifact:
        description: '재처리할 실패 상태 artifact 이름 (failure-state-generic-{company}-RUNID 형식, 비워두면 전체 실행)'
        required: false
        default: ''


jobs:
  crawl-and-ingest:
    name: ${{ inputs.company_code }} 크롤링 + 인제스트
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5시간 50분 (Actions 최대 6시간 근접)

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Python 의존성 설치
        run: |
          cd backend
          uv sync --frozen

      - name: Playwright 브라우저 설치
        run: |
          cd backend
          uv run playwright install chromium --with-deps

      # 재처리 모드: 이전 실패 상태 artifact 다운로드
      - name: 실패 상태 artifact 다운로드 (재처리 모드)
        if: ${{ inputs.resume_state_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.resume_state_artifact }}
          path: backend/
        continue-on-error: true

      - name: 크롤링 + 인제스트 실행
        run: |
          cd backend

          DRY_RUN_PARAM=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_PARAM="--dry-run"
          fi

          RESUME_PARAM=""
          STATE_FILE="failure_state_${{ inputs.company_code }}.json"
          if [ -n "${{ inputs.resume_state_artifact }}" ] && [ -f "${STATE_FILE}" ]; then
            RESUME_PARAM="--resume-state ${STATE_FILE}"
            echo "재처리 모드: ${STATE_FILE} 기반 실패 건 재처리"
          fi

          PYTHONPATH=. uv run python -m scripts.crawl_and_ingest_generic \
            --company ${{ inputs.company_code }} \
            $DRY_RUN_PARAM \
            $RESUME_PARAM \
            --fail-threshold ${{ inputs.fail_threshold || '0.05' }} \
            --state-output ${STATE_FILE}

      - name: 실패 상태 artifact 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-state-generic-${{ inputs.company_code }}-${{ github.run_id }}
          path: backend/failure_state_${{ inputs.company_code }}.json
          if-no-files-found: ignore
          retention-days: 30

      - name: 실행 결과 요약
        if: always()
        run: |
          COMPANY="${{ inputs.company_code }}"
          STATE_FILE="backend/failure_state_${COMPANY}.json"

          echo "## ${COMPANY} 인제스트 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: $(date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- 보험사 코드: ${COMPANY}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry-run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "${STATE_FILE}" ]; then
            FAIL_COUNT=$(python3 -c "import json; d=json.load(open('${STATE_FILE}')); print(len(d.get('failures', [])))" 2>/dev/null || echo "?")
            STOP_REASON=$(python3 -c "import json; d=json.load(open('${STATE_FILE}')); print(d.get('stop_reason', 'unknown'))" 2>/dev/null || echo "unknown")
            echo "- 실패 건수: ${FAIL_COUNT}건" >> $GITHUB_STEP_SUMMARY
            echo "- 중단 사유: ${STOP_REASON}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 재처리 방법" >> $GITHUB_STEP_SUMMARY
            echo "1. Actions 탭 → Run workflow" >> $GITHUB_STEP_SUMMARY
            echo "2. company_code: \`${COMPANY}\`" >> $GITHUB_STEP_SUMMARY
            echo "3. \`resume_state_artifact\` 에 \`failure-state-generic-${COMPANY}-${{ github.run_id }}\` 입력" >> $GITHUB_STEP_SUMMARY
          fi
