# 메트라이프생명 약관 공시 크롤러 설정 (SPEC-CRAWLER-002 REQ-06)
# 메트라이프생명보험 - metlife.co.kr
# 글로벌 보험사로 약관 공시 페이지 구조가 다를 수 있음
# 셀렉터는 실제 사이트 검증 필요
company_name: 메트라이프생명
company_code: metlife
category: LIFE
base_url: https://www.metlife.co.kr
listing_url: https://www.metlife.co.kr/customer/disclosure/terms.do
selectors:
  listing_container: "table tbody tr, .terms-list li"
  product_name: "td:nth-child(2) a, td:nth-child(2), .title"
  product_code: "td:nth-child(1)"
  pdf_link: "a[href*='.pdf'], a[href*='download']"
  next_page: ".paging .next, a.btn_next"
  sale_status: "td:last-child"
pagination:
  type: numbered
  max_pages: 30
rate_limit_seconds: 3.0
timeout_ms: 30000
