services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: bodam_staging
      POSTGRES_USER: bodam
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:-staging_password_change_me}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bodam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # 예시 파일: .env.staging.example (루트 레벨)
    env_file: .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    stop_signal: SIGTERM

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=4 --prefetch-multiplier=1
    env_file: .env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    stop_signal: SIGTERM

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env.staging
    depends_on:
      - backend

volumes:
  staging_postgres_data:
